<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 270" width="800" height="270">
  <defs>
    <style>
      @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
      @keyframes flow{from{stroke-dashoffset:20}to{stroke-dashoffset:0}}
      .pulse{animation:pulse 2s ease-in-out infinite}
      .flow{animation:flow 1s linear infinite;stroke-dasharray:5 5}
    </style>
  </defs>
  <rect width="800" height="270" fill="#0d1117"/>
  <text x="40" y="55" font-family="JetBrains Mono,monospace" font-size="30" font-weight="700" fill="#e6edf3">agent-workflow</text>
  <text x="40" y="80" font-family="JetBrains Mono,monospace" font-size="13" fill="#8b949e">DAG-based workflow orchestration</text>
  <text x="40" y="98" font-family="monospace" font-size="9" fill="#cc9933">Zero external dependencies · Python 3.10+ · MIT licensed</text>

  <!-- Visual: agent pipeline -->
  <rect x="40" y="120" width="100" height="50" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="2" class="pulse"/>
  <text x="90" y="142" font-family="monospace" font-size="10" fill="#8957e5" text-anchor="middle">Agent</text>
  <text x="90" y="158" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">input</text>

  <line x1="140" y1="145" x2="190" y2="145" stroke="#8957e5" stroke-width="2" class="flow" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#8957e5"/></marker></defs>

  <rect x="192" y="115" width="160" height="60" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="2.5"/>
  <text x="272" y="140" font-family="monospace" font-size="11" fill="#8957e5" text-anchor="middle">agent-workflow</text>
  <text x="272" y="158" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">DAG-based workflow orchestration</text>

  <line x1="352" y1="145" x2="402" y2="145" stroke="#3fb950" stroke-width="2" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#3fb950"/></marker></defs>

  <rect x="404" y="120" width="100" height="50" rx="8" fill="#1a3320" stroke="#238636" stroke-width="2"/>
  <text x="454" y="142" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">✓ Output</text>
  <text x="454" y="158" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">safe · typed</text>

  <!-- Arsenal link -->
  <text x="560" y="140" font-family="monospace" font-size="9" fill="#484f58">part of</text>
  <rect x="596" y="125" width="80" height="30" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="636" y="145" font-family="monospace" font-size="10" fill="#cc9933" text-anchor="middle">arsenal</text>

  <rect x="40" y="230" width="98" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/><text x="89" y="245" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">DAG execution</text><rect x="146" y="230" width="116" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/><text x="204" y="245" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">topological sort</text><rect x="270" y="230" width="104" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/><text x="322" y="245" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">parallel steps</text><rect x="382" y="230" width="110" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/><text x="437" y="245" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">cycle detection</text>
</svg>